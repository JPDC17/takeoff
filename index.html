<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TakeOff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

:root {
  --bg:      #0e0f11;
  --surf:    #16181c;
  --surf2:   #1e2128;
  --border:  #2a2d35;
  --accent:  #f0c040;
  --danger:  #ff5f5f;
  --text:    #e8eaf0;
  --muted:   #6b7280;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* ─── LAYOUT ─── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
}

/* ─── HEADER ─── */
#hdr {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  height: 50px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#hdr::-webkit-scrollbar { display: none; }

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}
.logo em { color: var(--text); opacity: 0.3; font-style: normal; font-weight: 700; }

.hdiv { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.tbtn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  border-radius: 7px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  -webkit-appearance: none;
}
.tbtn:active, .tbtn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

.scale-wrap {
  display: flex; align-items: center; gap: 5px;
  margin-left: auto;
  flex-shrink: 0;
}
.scale-wrap label { font-size: 10px; color: var(--muted); white-space: nowrap; }

input[type=number], select {
  background: var(--surf2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  border-radius: 6px;
  -webkit-appearance: none;
  appearance: none;
}
#scaleIn { padding: 5px 6px; width: 60px; text-align: right; }
#scaleIn:focus { outline: none; border-color: var(--accent); }
#unitIn  { padding: 5px 6px; }
#unitIn:focus { outline: none; border-color: var(--accent); }

/* ─── MAIN ─── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ─── PAGE PANEL ─── */
#pagePanel {
  width: 80px;
  background: var(--surf);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  padding: 6px 4px;
  gap: 2px;
  -webkit-overflow-scrolling: touch;
}
#pagePanel::-webkit-scrollbar { width: 2px; }
#pagePanel::-webkit-scrollbar-thumb { background: var(--border); }

.tw {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 5px 2px;
  border-radius: 6px; cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.12s, background 0.12s;
  flex-shrink: 0;
}
.tw.active { border-color: var(--accent); background: rgba(240,192,64,0.06); }

.tbox {
  width: 60px; height: 46px;
  background: #aaa;
  border-radius: 3px; overflow: hidden;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.tbox canvas { display: block; max-width: 60px; max-height: 46px; }

.tbadge {
  position: absolute; top: 2px; right: 2px;
  background: var(--accent); color: #000;
  font-size: 7px; font-weight: 700; border-radius: 3px;
  padding: 1px 3px; line-height: 1.4; display: none;
}

.tnum { font-size: 9px; color: var(--muted); }
.tw.active .tnum { color: var(--accent); }

/* ─── CANVAS WRAP ─── */
#cvsWrap {
  flex: 1; position: relative; overflow: hidden;
  background: #191b21;
}

.drop-ovl {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  z-index: 5; pointer-events: none;
  background: radial-gradient(ellipse at center, #1c1f26 0%, #0e0f11 100%);
  text-align: center; padding: 24px;
}
.drop-ovl.hidden { display: none; }
.drop-icon { font-size: 44px; opacity: 0.15; }
.drop-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--muted); }
.drop-sub { font-size: 11px; color: var(--muted); opacity: 0.4; line-height: 1.9; }
.drop-btn {
  padding: 10px 24px; background: var(--accent); color: #000; border: none;
  border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
  cursor: pointer; pointer-events: all; margin-top: 4px;
}

.load-ovl {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center; flex-direction: column; gap: 10px;
  background: rgba(10,11,14,0.85); z-index: 30;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-size: 11px; color: var(--muted); }

#dc { position: absolute; top: 0; left: 0; touch-action: none; }
#oc { position: absolute; top: 0; left: 0; pointer-events: none; }

/* finish-area button (mobile) */
#finishBtn {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #000; border: none;
  padding: 10px 20px; border-radius: 8px;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 12px;
  cursor: pointer; z-index: 20; display: none; white-space: nowrap;
}

.zoom-ctrl {
  position: absolute; bottom: 14px; left: 10px;
  display: flex; flex-direction: column; gap: 3px; z-index: 10;
}
.zbtn {
  width: 34px; height: 34px;
  background: var(--surf); border: 1px solid var(--border); color: var(--text);
  font-size: 16px; border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.zbtn:active { border-color: var(--accent); color: var(--accent); }
.zlbl { font-size: 9px; color: var(--muted); text-align: center; padding: 1px 0; }

#coords {
  position: absolute; bottom: 14px; left: 56px;
  font-size: 9px; color: var(--muted);
  background: var(--surf); padding: 4px 7px;
  border-radius: 4px; border: 1px solid var(--border);
  display: none; /* hidden on mobile */
}

/* ─── SIDEBAR / BOTTOM SHEET ─── */
/* Desktop sidebar */
#sidebar {
  width: 272px;
  background: var(--surf);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}

/* Mobile: sidebar becomes a bottom-anchored panel */
@media (max-width: 700px) {
  #hdr { height: 48px; }
  #pagePanel { width: 70px; }
  .tbox { width: 54px; height: 42px; }

  #sidebar {
    position: fixed; bottom: 0; left: 0; right: 0;
    width: 100%; height: 42vh;
    border-left: none; border-top: 2px solid var(--border);
    z-index: 50;
    transform: translateY(calc(100% - 46px));
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    padding-bottom: var(--safe-bottom);
  }
  #sidebar.open { transform: translateY(0); }

  #cvsWrap { margin-bottom: 46px; }

  #coords { display: none !important; }

  .tbtn kbd { display: none; }
}

/* Sidebar handle (mobile) */
#sbHandle {
  display: none;
  align-items: center; justify-content: center;
  height: 46px; cursor: pointer; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.sb-handle-bar { width: 36px; height: 4px; background: var(--border); border-radius: 2px; }
.sb-handle-lbl { font-size: 10px; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 1px; }
@media (max-width: 700px) { #sbHandle { display: flex; } }

.panel-hdr {
  padding: 10px 12px 8px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.clr-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-size: 9px; font-family: 'DM Mono', monospace; padding: 3px 8px;
  border-radius: 4px; cursor: pointer;
}
.clr-btn:active { border-color: var(--danger); color: var(--danger); }

.color-strip {
  display: flex; gap: 5px; padding: 7px 12px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0;
}
.sw {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; flex-shrink: 0; transition: transform 0.1s;
}
.sw:active { transform: scale(1.2); }
.sw.active { border-color: #fff; }

.ftabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ftab {
  flex: 1; padding: 7px 2px; font-size: 9px; text-align: center;
  cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
  letter-spacing: 0.3px;
}
.ftab.active { color: var(--accent); border-bottom-color: var(--accent); }

.mlist { flex: 1; overflow-y: auto; padding: 6px; -webkit-overflow-scrolling: touch; }
.mlist::-webkit-scrollbar { width: 3px; }
.mlist::-webkit-scrollbar-thumb { background: var(--border); }

.empty-msg { padding: 24px 12px; text-align: center; font-size: 10px; color: var(--muted); opacity: 0.45; line-height: 2; }

.mi {
  padding: 8px 9px; border: 1px solid var(--border);
  border-radius: 7px; margin-bottom: 5px; cursor: pointer;
}
.mi.sel { border-color: var(--accent); background: rgba(240,192,64,0.04); }
.mi-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.mdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.mlbl { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mpg { font-size: 8px; color: var(--muted); background: var(--surf2); padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
.mdel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 3px; line-height: 1; flex-shrink: 0; }
.mval { font-size: 15px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 1px; }
.mtyp { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.summary { border-top: 1px solid var(--border); padding: 8px 12px; flex-shrink: 0; }
.sr { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; font-size: 10px; }
.sl { color: var(--muted); }
.sv { font-weight: 500; }
.sr.tot { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 7px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; }
.sr.tot .sv { color: var(--accent); }

.exp-btn {
  margin: 6px 12px 10px;
  padding: 9px; background: var(--accent); border: none; border-radius: 7px;
  color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px;
  cursor: pointer; width: calc(100% - 24px); flex-shrink: 0;
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="hdr">
    <div class="logo">TAKE<em>OFF</em></div>
    <div class="hdiv"></div>
    <button class="tbtn active" id="tPan"    onclick="setTool('pan')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
      Pan <kbd>1</kbd>
    </button>
    <button class="tbtn" id="tLength" onclick="setTool('length')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="2" y1="12" x2="22" y2="12"/><polyline points="8,6 2,12 8,18"/><polyline points="16,6 22,12 16,18"/></svg>
      Length <kbd>2</kbd>
    </button>
    <button class="tbtn" id="tArea" onclick="setTool('area')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="3,20 12,4 21,20"/></svg>
      Polygon <kbd>3</kbd>
    </button>
    <button class="tbtn" id="tRect" onclick="setTool('rect')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="5" width="18" height="14" rx="1"/></svg>
      Rect <kbd>4</kbd>
    </button>
    <div class="hdiv"></div>
    <div class="scale-wrap">
      <label>1:</label>
      <input type="number" id="scaleIn" value="100" min="0.0001" step="any" inputmode="decimal">
      <select id="unitIn">
        <option value="mm">mm</option>
        <option value="cm">cm</option>
        <option value="m" selected>m</option>
        <option value="in">in</option>
        <option value="ft">ft</option>
      </select>
      <label style="font-size:9px;color:var(--muted)">/px</label>
    </div>
  </header>

  <!-- MAIN -->
  <div id="main">

    <!-- PAGE THUMBNAILS -->
    <div id="pagePanel"></div>

    <!-- CANVAS -->
    <div id="cvsWrap">
      <div class="drop-ovl" id="dropOvl">
        <div class="drop-icon">📐</div>
        <div class="drop-title">Upload a Drawing</div>
        <div class="drop-sub">PDF (multi-page) or any image<br>Floor plans, site plans, elevations…</div>
        <button class="drop-btn" onclick="document.getElementById('fileIn').click()">Choose File</button>
      </div>

      <div class="load-ovl" id="loadOvl">
        <div class="spinner"></div>
        <div class="load-txt" id="loadTxt">Loading…</div>
      </div>

      <canvas id="dc"></canvas>
      <canvas id="oc"></canvas>

      <!-- Mobile: finish polygon button -->
      <button id="finishBtn" onclick="finishArea()">✓ Finish Polygon</button>

      <div class="zoom-ctrl">
        <button class="zbtn" onclick="doZoom(1.2)">+</button>
        <div class="zlbl" id="zoomLbl">100%</div>
        <button class="zbtn" onclick="doZoom(1/1.2)">−</button>
        <button class="zbtn" style="font-size:11px" onclick="resetView()">⌂</button>
      </div>
      <div id="coords">x:0 y:0</div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sbHandle" onclick="toggleSidebar()">
        <div class="sb-handle-bar"></div>
        <div class="sb-handle-lbl" id="sbLbl">MEASUREMENTS</div>
      </div>

      <div class="panel-hdr">
        Measurements
        <button class="clr-btn" onclick="clearAll()">Clear All</button>
      </div>

      <div class="color-strip" id="colorStrip"></div>

      <div class="ftabs">
        <div class="ftab active" id="fAll"  onclick="setFilter('all')">ALL</div>
        <div class="ftab"        id="fPage" onclick="setFilter('page')">PAGE</div>
        <div class="ftab"        id="fLen"  onclick="setFilter('length')">LEN</div>
        <div class="ftab"        id="fArea" onclick="setFilter('area')">AREA</div>
      </div>

      <div class="mlist" id="mlist">
        <div class="empty-msg">No measurements yet.<br>Upload a drawing,<br>then tap a tool above.</div>
      </div>

      <div class="summary" id="sumDiv" style="display:none">
        <div class="sr"><span class="sl">Total Length</span><span class="sv" id="sumLen">—</span></div>
        <div class="sr"><span class="sl">Total Area</span><span class="sv" id="sumArea">—</span></div>
        <div class="sr tot"><span class="sl">Count</span><span class="sv" id="sumCnt">0</span></div>
      </div>
      <button class="exp-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<input type="file" id="fileIn" accept="image/*,.pdf,application/pdf" style="display:none">

<script>
'use strict';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── STATE ───────────────────────────────────────────────────────────────────
// SCALE FIX EXPLANATION:
// PDF pages are rendered at PDF_RENDER_SCALE (e.g. 1.5) for crispness.
// World coordinates are stored in LOGICAL pixels (= rendered px / PDF_RENDER_SCALE).
// So 1 world-unit = 1 logical pixel = 1/PDF_RENDER_SCALE rendered pixels.
// The view transform maps world → canvas:  canvasX = worldX * viewScale + offsetX
// The drawing canvas also maps rendered-px → canvas, with an implicit
// reduction by PDF_RENDER_SCALE baked into drawImage().
// Distance in world-px × (scaleInput / 1) × unit = real-world measurement.
// This means the scale input means "real-world units per logical pixel".

const PDF_RENDER_SCALE = 1.5; // render PDF at 1.5× for sharpness; world coords are in 1× logical px

const S = {
  tool: 'pan',
  pdfDoc:  null,
  pages:   [],       // {canvas, w, h} in RENDERED px; logical = rendered / PDF_RENDER_SCALE
  curPage: 0,
  totPages: 0,
  vs: 1, ox: 0, oy: 0,  // view: world→canvas transform
  drag: false, dx0: 0, dy0: 0,
  // pinch
  pinching: false, pinchDist0: 0, pinchVs0: 0, pinchMid: null,
  // tap timing (for double-tap on mobile)
  lastTap: 0,
  measurements: [],
  pts: [],           // active drawing points (world coords)
  selId: null,
  color: '#f0c040',
  cnt: 1,
  filter: 'all',
  sbOpen: false,
};

const COLORS = ['#f0c040','#4da8ff','#7fff8a','#ff7eb3','#ff9f5a','#c97bff','#ff5f5f','#5affd6'];
const isMobile = () => window.innerWidth <= 700;

// ─── CANVASES ────────────────────────────────────────────────────────────────
const cvsWrap = document.getElementById('cvsWrap');
const dc = document.getElementById('dc');
const oc = document.getElementById('oc');
const dctx = dc.getContext('2d');
const octx = oc.getContext('2d');

function resizeCvs() {
  const r = cvsWrap.getBoundingClientRect();
  dc.width = oc.width = r.width;
  dc.height = oc.height = r.height;
  redraw();
}
window.addEventListener('resize', resizeCvs);
resizeCvs();

// ─── FILE INPUT ──────────────────────────────────────────────────────────────
document.getElementById('fileIn').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});
cvsWrap.addEventListener('dragover', e => { e.preventDefault(); cvsWrap.style.outline = '2px dashed var(--accent)'; });
cvsWrap.addEventListener('dragleave', () => { cvsWrap.style.outline = ''; });
cvsWrap.addEventListener('drop', e => {
  e.preventDefault(); cvsWrap.style.outline = '';
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(f) {
  const isPdf = f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf');
  if (isPdf) loadPDF(f);
  else if (f.type.startsWith('image/')) loadImage(f);
  else alert('Please upload a PDF or image file.');
}

async function loadPDF(file) {
  showLoad('Loading PDF…');
  try {
    const buf = await file.arrayBuffer();
    S.pdfDoc     = await pdfjsLib.getDocument({ data: buf }).promise;
    S.totPages   = S.pdfDoc.numPages;
    S.pages      = new Array(S.totPages).fill(null);
    S.curPage    = 0;
    resetMeasurements();
    buildThumbPanel();
    await renderPdfPage(0);
    document.getElementById('dropOvl').classList.add('hidden');
  } catch(e) { alert('Could not load PDF: ' + e.message); }
  finally { hideLoad(); }
}

function loadImage(file) {
  showLoad('Loading image…');
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    S.pdfDoc = null; S.totPages = 1;
    // For images, PDF_RENDER_SCALE = 1 (no scaling), logical = rendered
    S.pages = [{ canvas: c, w: img.width, h: img.height, rscale: 1 }];
    S.curPage = 0;
    resetMeasurements();
    buildThumbPanel();
    switchPage(0);
    document.getElementById('dropOvl').classList.add('hidden');
    hideLoad();
    URL.revokeObjectURL(url);
  };
  img.onerror = () => { alert('Could not load image.'); hideLoad(); };
  img.src = url;
}

async function renderPdfPage(idx) {
  if (S.pages[idx]) { switchPage(idx); return; }
  showLoad(`Rendering page ${idx + 1} / ${S.totPages}…`);
  try {
    const page = await S.pdfDoc.getPage(idx + 1);
    const vp   = page.getViewport({ scale: PDF_RENDER_SCALE });
    const c    = document.createElement('canvas');
    c.width = vp.width; c.height = vp.height;
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
    // logical dimensions = rendered / PDF_RENDER_SCALE
    S.pages[idx] = { canvas: c, w: vp.width, h: vp.height, rscale: PDF_RENDER_SCALE };
    updateThumb(idx);
  } catch(e) { console.error(e); alert('Error rendering page ' + (idx+1)); }
  finally { hideLoad(); }
  switchPage(idx);
}

function switchPage(idx) {
  S.curPage = idx;
  document.querySelectorAll('.tw').forEach((el, i) => el.classList.toggle('active', i === idx));
  resetView();
  renderSidebar();
  updateFinishBtn();
}

// ─── LOGICAL SIZE of a page ─────────────────────────────────────────────────
// World/logical pixels = rendered pixels / rscale
function logW(pg) { return pg.w / pg.rscale; }
function logH(pg) { return pg.h / pg.rscale; }

// ─── THUMBNAILS ──────────────────────────────────────────────────────────────
function buildThumbPanel() {
  const panel = document.getElementById('pagePanel');
  panel.innerHTML = '';
  for (let i = 0; i < S.totPages; i++) {
    const tw = document.createElement('div');
    tw.className = 'tw' + (i === 0 ? ' active' : '');
    tw.onclick = () => S.pdfDoc ? renderPdfPage(i) : switchPage(i);

    const box = document.createElement('div');
    box.className = 'tbox'; box.id = 'tbox-' + i;

    const badge = document.createElement('div');
    badge.className = 'tbadge'; badge.id = 'tbadge-' + i;
    box.appendChild(badge);

    const num = document.createElement('div');
    num.className = 'tnum'; num.textContent = i + 1;

    tw.appendChild(box); tw.appendChild(num);
    panel.appendChild(tw);
    if (S.pages[i]) updateThumb(i);
  }
}

function updateThumb(idx) {
  const pg = S.pages[idx]; if (!pg) return;
  const box = document.getElementById('tbox-' + idx); if (!box) return;
  let tc = box.querySelector('canvas');
  if (!tc) { tc = document.createElement('canvas'); box.insertBefore(tc, box.firstChild); }
  const maxW = 60, maxH = 46;
  const ratio = Math.min(maxW / pg.w, maxH / pg.h);
  tc.width  = Math.round(pg.w * ratio);
  tc.height = Math.round(pg.h * ratio);
  tc.getContext('2d').drawImage(pg.canvas, 0, 0, tc.width, tc.height);
  refreshBadge(idx);
}

function refreshBadge(idx) {
  const badge = document.getElementById('tbadge-' + idx); if (!badge) return;
  const n = S.measurements.filter(m => m.page === idx).length;
  badge.textContent = n; badge.style.display = n > 0 ? 'block' : 'none';
}

// ─── TOOLS ───────────────────────────────────────────────────────────────────
function setTool(t) {
  S.tool = t; S.pts = [];
  ['pan','length','area','rect'].forEach(id => {
    document.getElementById('t' + id.charAt(0).toUpperCase() + id.slice(1))
      .classList.toggle('active', id === t);
  });
  dc.style.cursor = t === 'pan' ? 'grab' : 'crosshair';
  updateFinishBtn();
  redrawOverlay();
}
setTool('pan');

function updateFinishBtn() {
  const btn = document.getElementById('finishBtn');
  btn.style.display = (S.tool === 'area' && S.pts.length >= 3) ? 'block' : 'none';
}

// ─── COORDINATE TRANSFORMS ───────────────────────────────────────────────────
function toCvs(wx, wy) { return { x: wx * S.vs + S.ox, y: wy * S.vs + S.oy }; }
function toWld(cx, cy) { return { x: (cx - S.ox) / S.vs, y: (cy - S.oy) / S.vs }; }

// ─── VIEW ────────────────────────────────────────────────────────────────────
function resetView() {
  const pg = S.pages[S.curPage]; if (!pg) return;
  const lw = logW(pg), lh = logH(pg);
  const r  = cvsWrap.getBoundingClientRect();
  const s  = Math.min(r.width * 0.93 / lw, r.height * 0.93 / lh);
  S.vs = s;
  S.ox = (r.width  - lw * s) / 2;
  S.oy = (r.height - lh * s) / 2;
  updateZL(); redraw();
}

function doZoom(f, cx, cy) {
  const r = cvsWrap.getBoundingClientRect();
  cx = cx ?? r.width / 2; cy = cy ?? r.height / 2;
  const wx = (cx - S.ox) / S.vs, wy = (cy - S.oy) / S.vs;
  S.vs = Math.max(0.04, Math.min(40, S.vs * f));
  S.ox = cx - wx * S.vs; S.oy = cy - wy * S.vs;
  updateZL(); redraw();
}
function updateZL() { document.getElementById('zoomLbl').textContent = Math.round(S.vs * 100) + '%'; }

// ─── MOUSE EVENTS ────────────────────────────────────────────────────────────
dc.addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.deltaY < 0 ? 1.1 : 0.909, e.offsetX, e.offsetY);
}, { passive: false });

dc.addEventListener('mousedown', e => {
  if (e.button === 1 || S.tool === 'pan') {
    S.drag = true; S.dx0 = e.clientX; S.dy0 = e.clientY;
    dc.style.cursor = 'grabbing'; return;
  }
  if (e.button !== 0) return;
  handleTap(e.offsetX, e.offsetY);
});

dc.addEventListener('mousemove', e => {
  const w = toWld(e.offsetX, e.offsetY);
  document.getElementById('coords').textContent = 'x:' + Math.round(w.x) + ' y:' + Math.round(w.y);
  if (S.drag) {
    S.ox += e.clientX - S.dx0; S.oy += e.clientY - S.dy0;
    S.dx0 = e.clientX; S.dy0 = e.clientY;
    redraw(); return;
  }
  redrawOverlay(w.x, w.y);
});

dc.addEventListener('mouseup',  () => { S.drag = false; dc.style.cursor = S.tool === 'pan' ? 'grab' : 'crosshair'; });
dc.addEventListener('mouseleave', () => { S.drag = false; });
dc.addEventListener('dblclick', () => { if (S.tool === 'area' && S.pts.length >= 3) finishArea(); });
dc.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (S.tool === 'area' && S.pts.length >= 3) finishArea();
  else { S.pts = []; updateFinishBtn(); redrawOverlay(); }
});

// ─── TOUCH EVENTS (iPhone / iPad) ────────────────────────────────────────────
function getTouchPos(touch) {
  const r = dc.getBoundingClientRect();
  return { x: touch.clientX - r.left, y: touch.clientY - r.top };
}
function touchDist(t1, t2) {
  return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
}
function touchMid(t1, t2, r) {
  return { x: (t1.clientX + t2.clientX) / 2 - r.left,
           y: (t1.clientY + t2.clientY) / 2 - r.top };
}

dc.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    // pinch start
    S.pinching   = true; S.drag = false;
    S.pinchDist0 = touchDist(e.touches[0], e.touches[1]);
    S.pinchVs0   = S.vs;
    const r = dc.getBoundingClientRect();
    S.pinchMid   = touchMid(e.touches[0], e.touches[1], r);
    return;
  }
  if (e.touches.length === 1) {
    S.pinching = false;
    const pos = getTouchPos(e.touches[0]);
    if (S.tool === 'pan') {
      S.drag = true; S.dx0 = e.touches[0].clientX; S.dy0 = e.touches[0].clientY;
      return;
    }
    // double-tap detection
    const now = Date.now();
    if (now - S.lastTap < 300 && S.tool === 'area' && S.pts.length >= 3) {
      finishArea(); S.lastTap = 0; return;
    }
    S.lastTap = now;
    handleTap(pos.x, pos.y);
  }
}, { passive: false });

dc.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && S.pinching) {
    const r    = dc.getBoundingClientRect();
    const d    = touchDist(e.touches[0], e.touches[1]);
    const mid  = touchMid(e.touches[0], e.touches[1], r);
    const f    = d / S.pinchDist0;
    const newVs = Math.max(0.04, Math.min(40, S.pinchVs0 * f));
    const wx = (S.pinchMid.x - S.ox) / S.vs;
    const wy = (S.pinchMid.y - S.oy) / S.vs;
    S.vs = newVs;
    S.ox = mid.x - wx * S.vs;
    S.oy = mid.y - wy * S.vs;
    updateZL(); redraw(); return;
  }
  if (e.touches.length === 1 && S.drag) {
    S.ox += e.touches[0].clientX - S.dx0;
    S.oy += e.touches[0].clientY - S.dy0;
    S.dx0 = e.touches[0].clientX; S.dy0 = e.touches[0].clientY;
    redraw(); return;
  }
  if (e.touches.length === 1 && S.tool !== 'pan') {
    const pos = getTouchPos(e.touches[0]);
    const w   = toWld(pos.x, pos.y);
    redrawOverlay(w.x, w.y);
  }
}, { passive: false });

dc.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length < 2) S.pinching = false;
  if (e.touches.length === 0) { S.drag = false; }
}, { passive: false });

// ─── TAP / CLICK HANDLER ─────────────────────────────────────────────────────
function handleTap(cx, cy) {
  if (!S.pages.length) return;
  const w = toWld(cx, cy);
  if (S.tool === 'length') {
    S.pts.push(w);
    if (S.pts.length === 2) finishLen();
  } else if (S.tool === 'area') {
    S.pts.push(w);
    updateFinishBtn();
  } else if (S.tool === 'rect') {
    S.pts.push(w);
    if (S.pts.length === 2) finishRect();
  }
  redrawOverlay(w.x, w.y);
}

// ─── SCALE & MEASUREMENT MATH ────────────────────────────────────────────────
// World px distances are in LOGICAL pixels (= rendered px / rscale).
// getScl().s is the real-world units per logical pixel.
// So:  real_length = pixel_distance_in_world × s
//      real_area   = pixel_area_in_world     × s × s

function getScl() {
  return {
    s: parseFloat(document.getElementById('scaleIn').value) || 1,
    u: document.getElementById('unitIn').value,
  };
}

function wDist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }

function polyArea(pts) {
  let a = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    a += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
  }
  return Math.abs(a) / 2;
}

function fmtLen(wpx) {
  const { s, u } = getScl();
  const v = wpx * s;
  return fmt(v) + '\u202f' + u;
}

function fmtArea(wpx2) {
  const { s, u } = getScl();
  const v = wpx2 * s * s;
  return fmt(v) + '\u202f' + u + '\u00b2';
}

function fmt(v) {
  if (v >= 1000) return v.toFixed(0);
  if (v >= 10)   return v.toFixed(1);
  return v.toFixed(3);
}

// ─── FINISH MEASUREMENTS ─────────────────────────────────────────────────────
function finishLen() {
  const p = [...S.pts];
  addM({ type: 'length', pts: p, wpx: wDist(p[0], p[1]) });
  S.pts = [];
}
function finishArea() {
  const p = [...S.pts];
  if (p.length < 3) return;
  addM({ type: 'area', pts: p, wpx2: polyArea(p) });
  S.pts = [];
  updateFinishBtn();
}
function finishRect() {
  const [a, b] = S.pts;
  const pts = [{ x:a.x,y:a.y },{ x:b.x,y:a.y },{ x:b.x,y:b.y },{ x:a.x,y:b.y }];
  addM({ type: 'rect', pts, wpx2: Math.abs((b.x - a.x) * (b.y - a.y)) });
  S.pts = [];
}

function addM(m) {
  m.id    = Date.now() + Math.random();
  m.color = S.color;
  m.page  = S.curPage;
  m.label = (m.type === 'length' ? 'Length' : 'Area') + '\u00a0' + S.cnt++;
  S.measurements.push(m);
  renderSidebar(); redraw(); refreshBadge(S.curPage);
}

function delM(id, e) {
  e.stopPropagation();
  const m = S.measurements.find(x => x.id === id);
  S.measurements = S.measurements.filter(x => x.id !== id);
  if (S.selId === id) S.selId = null;
  if (m) refreshBadge(m.page);
  renderSidebar(); redraw();
}

function clearAll() {
  if (!confirm('Clear all measurements?')) return;
  resetMeasurements();
  for (let i = 0; i < S.totPages; i++) refreshBadge(i);
  renderSidebar(); redraw();
}

function resetMeasurements() {
  S.measurements = []; S.pts = []; S.selId = null; S.cnt = 1;
  updateFinishBtn();
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(f) {
  S.filter = f;
  [['all','fAll'],['page','fPage'],['length','fLen'],['area','fArea']].forEach(([id, elId]) => {
    document.getElementById(elId).classList.toggle('active', id === f);
  });
  renderSidebar();
}

function filtered() {
  return S.measurements.filter(m => {
    if (S.filter === 'page')   return m.page === S.curPage;
    if (S.filter === 'length') return m.type === 'length';
    if (S.filter === 'area')   return m.type === 'area' || m.type === 'rect';
    return true;
  });
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function toggleSidebar() {
  S.sbOpen = !S.sbOpen;
  document.getElementById('sidebar').classList.toggle('open', S.sbOpen);
  document.getElementById('sbLbl').textContent = S.sbOpen ? 'HIDE ▼' : 'MEASUREMENTS ▲';
}

function renderSidebar() {
  const list   = document.getElementById('mlist');
  const sumDiv = document.getElementById('sumDiv');
  const fms    = filtered();

  // update handle badge count
  const total = S.measurements.length;
  document.getElementById('sbLbl').textContent =
    S.sbOpen ? 'HIDE ▼' : `MEASUREMENTS${total > 0 ? ' ('+total+')' : ''} ▲`;

  if (fms.length === 0) {
    list.innerHTML = '<div class="empty-msg">No measurements yet.<br>Upload a drawing,<br>then tap a tool above.</div>';
    sumDiv.style.display = 'none'; return;
  }
  sumDiv.style.display = '';
  list.innerHTML = '';
  let tLen = 0, tArea = 0;

  fms.forEach(m => {
    const d = document.createElement('div');
    d.className = 'mi' + (m.id === S.selId ? ' sel' : '');
    d.onclick = () => {
      S.selId = m.id;
      if (m.page !== S.curPage) {
        if (S.pdfDoc) renderPdfPage(m.page); else switchPage(m.page);
      } else { renderSidebar(); redrawOverlay(); }
    };
    let val, typ;
    if (m.type === 'length') { val = fmtLen(m.wpx);   typ = 'Linear';      tLen  += m.wpx;  }
    else                      { val = fmtArea(m.wpx2); typ = m.type === 'rect' ? 'Rectangle' : 'Polygon'; tArea += m.wpx2; }
    d.innerHTML =
      `<div class="mi-hdr">
        <div class="mdot" style="background:${m.color}"></div>
        <div class="mlbl">${m.label}</div>
        <div class="mpg">pg ${m.page+1}</div>
        <button class="mdel" onclick="delM(${m.id},event)">×</button>
       </div>
       <div class="mval">${val}</div>
       <div class="mtyp">${typ}</div>`;
    list.appendChild(d);
  });

  document.getElementById('sumLen').textContent  = tLen  > 0 ? fmtLen(tLen)    : '—';
  document.getElementById('sumArea').textContent = tArea > 0 ? fmtArea(tArea)  : '—';
  document.getElementById('sumCnt').textContent  = fms.length;
}

// ─── COLOR STRIP ─────────────────────────────────────────────────────────────
const cs = document.getElementById('colorStrip');
COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'sw' + (c === S.color ? ' active' : '');
  sw.style.background = c;
  sw.onclick = () => {
    S.color = c;
    document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
  };
  cs.appendChild(sw);
});

// ─── DRAW ────────────────────────────────────────────────────────────────────
function redraw() {
  dctx.clearRect(0, 0, dc.width, dc.height);
  const pg = S.pages[S.curPage]; if (!pg) { redrawOverlay(); return; }

  // The page canvas is rendered at rscale × logical size.
  // We draw it at logical size × vs, effectively compressing by rscale then expanding by vs.
  const lw = logW(pg), lh = logH(pg);
  const c0 = toCvs(0, 0);
  dctx.fillStyle = '#fff';
  dctx.fillRect(c0.x, c0.y, lw * S.vs, lh * S.vs);
  dctx.drawImage(pg.canvas, c0.x, c0.y, lw * S.vs, lh * S.vs);

  S.measurements.filter(m => m.page === S.curPage).forEach(m => drawM(dctx, m, m.id === S.selId));
  redrawOverlay();
}

function drawM(ctx, m, hi) {
  const cp = m.pts.map(p => toCvs(p.x, p.y));
  ctx.save();
  ctx.strokeStyle = m.color;
  ctx.lineWidth = hi ? 2.8 : 2;
  ctx.setLineDash([]);

  if (m.type === 'length') {
    ctx.beginPath();
    ctx.moveTo(cp[0].x, cp[0].y);
    ctx.lineTo(cp[1].x, cp[1].y);
    ctx.stroke();
    // end tick marks
    const ang = Math.atan2(cp[1].y - cp[0].y, cp[1].x - cp[0].x) + Math.PI / 2;
    cp.forEach(p => {
      ctx.beginPath();
      ctx.moveTo(p.x + Math.cos(ang)*7, p.y + Math.sin(ang)*7);
      ctx.lineTo(p.x - Math.cos(ang)*7, p.y - Math.sin(ang)*7);
      ctx.stroke();
    });
    lblDraw(ctx, fmtLen(m.wpx), (cp[0].x+cp[1].x)/2, (cp[0].y+cp[1].y)/2 - 12, m.color);
  } else {
    ctx.fillStyle = m.color + '28';
    ctx.beginPath();
    ctx.moveTo(cp[0].x, cp[0].y);
    cp.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath(); ctx.fill(); ctx.stroke();
    cp.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI*2); ctx.fillStyle = m.color; ctx.fill(); });
    const mx = cp.reduce((s,p) => s+p.x, 0) / cp.length;
    const my = cp.reduce((s,p) => s+p.y, 0) / cp.length;
    lblDraw(ctx, fmtArea(m.wpx2), mx, my, m.color);
  }
  ctx.restore();
}

function lblDraw(ctx, text, x, y, color) {
  ctx.save();
  ctx.font = 'bold 11px "DM Mono",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(8,9,12,0.88)';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - tw/2 - 5, y - 16, tw + 10, 17, 3);
  else ctx.rect(x - tw/2 - 5, y - 16, tw + 10, 17);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ─── OVERLAY (in-progress drawing) ───────────────────────────────────────────
function redrawOverlay(mx, my) {
  octx.clearRect(0, 0, oc.width, oc.height);
  if (!S.pts.length && mx === undefined) return;

  const cp  = S.pts.map(p => toCvs(p.x, p.y));
  const cur = mx !== undefined ? toCvs(mx, my) : null;

  octx.save();
  octx.strokeStyle = S.color;
  octx.lineWidth = 2;
  octx.setLineDash([5, 4]);

  if (S.tool === 'length' && cp.length === 1 && cur) {
    octx.beginPath();
    octx.moveTo(cp[0].x, cp[0].y);
    octx.lineTo(cur.x, cur.y);
    octx.stroke();
    const d = wDist(S.pts[0], { x: mx, y: my });
    lblDraw(octx, fmtLen(d), (cp[0].x+cur.x)/2, (cp[0].y+cur.y)/2 - 12, S.color);
  }

  if ((S.tool === 'area' || S.tool === 'rect') && cp.length >= 1) {
    octx.beginPath();
    octx.moveTo(cp[0].x, cp[0].y);
    cp.slice(1).forEach(p => octx.lineTo(p.x, p.y));
    if (cur) octx.lineTo(cur.x, cur.y);
    if (S.tool === 'area') octx.lineTo(cp[0].x, cp[0].y); // close
    octx.stroke();

    if (S.tool === 'area' && S.pts.length >= 2 && cur) {
      const preview = [...S.pts, { x: mx, y: my }];
      const a = polyArea(preview);
      if (a > 0) {
        const allCp = [...cp, cur];
        const cx = allCp.reduce((s,p) => s+p.x, 0) / allCp.length;
        const cy = allCp.reduce((s,p) => s+p.y, 0) / allCp.length;
        lblDraw(octx, fmtArea(a), cx, cy, S.color);
      }
    }
  }

  // vertex dots
  octx.setLineDash([]);
  cp.forEach(p => {
    octx.beginPath(); octx.arc(p.x, p.y, 5, 0, Math.PI*2);
    octx.fillStyle = S.color; octx.fill();
  });
  octx.restore();
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportCSV() {
  if (!S.measurements.length) { alert('No measurements to export.'); return; }
  const { u, s } = getScl();
  let csv = 'Label,Page,Type,Value,Unit\n';
  S.measurements.forEach(m => {
    if (m.type === 'length')
      csv += `"${m.label}",${m.page+1},Length,${(m.wpx * s).toFixed(4)},${u}\n`;
    else
      csv += `"${m.label}",${m.page+1},Area,${(m.wpx2 * s * s).toFixed(4)},${u}²\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'takeoff.csv';
  a.click();
}

// ─── LOADING ─────────────────────────────────────────────────────────────────
function showLoad(t) {
  const el = document.getElementById('loadOvl');
  document.getElementById('loadTxt').textContent = t;
  el.style.display = 'flex';
}
function hideLoad() { document.getElementById('loadOvl').style.display = 'none'; }

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'Escape')  { S.pts = []; updateFinishBtn(); redrawOverlay(); }
  if (e.key === 'Enter' && S.tool === 'area' && S.pts.length >= 3) finishArea();
  if (e.key === '1') setTool('pan');
  if (e.key === '2') setTool('length');
  if (e.key === '3') setTool('area');
  if (e.key === '4') setTool('rect');
  if (e.key === '+' || e.key === '=') doZoom(1.2);
  if (e.key === '-') doZoom(1/1.2);
  if (e.key === '0') resetView();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    const n = S.curPage + 1;
    if (n < S.totPages) { if (S.pdfDoc) renderPdfPage(n); else switchPage(n); }
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    const n = S.curPage - 1;
    if (n >= 0) { if (S.pdfDoc) renderPdfPage(n); else switchPage(n); }
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && S.selId) {
    const m = S.measurements.find(x => x.id === S.selId);
    if (m) delM(m.id, { stopPropagation: () => {} });
  }
});

document.getElementById('scaleIn').addEventListener('input',  renderSidebar);
document.getElementById('unitIn').addEventListener('change', renderSidebar);

// show coords only on desktop
if (!isMobile()) document.getElementById('coords').style.display = 'block';
</script>
